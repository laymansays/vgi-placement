services:
  - type: web
    name: vgi-placement
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SHEET_ID
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: ADMIN_PIN
        sync: false
      - key: JOIN_PIN
        sync: false
      - key: DASHBOARD_PIN
        sync: false
